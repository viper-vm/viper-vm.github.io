name: Infra Atlas · daily news update

on:
  schedule:
    # 01:30 UTC = 07:00 IST, every day
    - cron: "30 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: infra-atlas-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch and extract today's infra news
        run: node scripts/infra-atlas/fetch-news.mjs
        env:
          # Optional: add ANTHROPIC_API_KEY in repo Settings → Secrets to get
          # Claude-quality summaries, precise coordinates and corridor routes.
          # Without it the keyword+gazetteer heuristic is used (still works).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit changes
        run: |
          git config user.name "infra-atlas-bot"
          git config user.email "actions@github.com"
          git add demos/infra-atlas/data/news.json demos/infra-atlas/data/seen.json demos/infra-atlas/data/inbox.json demos/infra-atlas/data/meta.json
          if git diff --cached --quiet; then
            echo "No new stories today."
          else
            git commit -m "Atlas: daily news update ($(date -u +%Y-%m-%d))"
            git push
          fi

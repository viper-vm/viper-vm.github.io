<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
  <rect width="1200" height="630" fill="#0c0f18"/>
  <!-- timeline with pips -->
  <line x1="70" y1="360" x2="1130" y2="360" stroke="rgba(255,255,255,.14)" stroke-width="3"/>
  <g fill="#ff5db1">
    <circle cx="120" cy="360" r="20"/><circle cx="240" cy="360" r="20"/><circle cx="470" cy="360" r="20"/>
    <circle cx="560" cy="360" r="20"/><circle cx="650" cy="360" r="20"/><circle cx="900" cy="360" r="20"/>
  </g>
  <g fill="none" stroke="#ff5db1" stroke-width="3" opacity=".5">
    <circle cx="120" cy="360" r="34"/><circle cx="470" cy="360" r="34"/><circle cx="900" cy="360" r="34"/>
  </g>
  <text x="70" y="150" font-size="72" font-weight="800" fill="#eaeefc">🥁 <tspan fill="#ff5db1">CLAPBACK</tspan></text>
  <text x="72" y="212" font-size="32" font-weight="600" fill="#8f9abb">Tap a beat. Send the link.</text>
  <text x="72" y="262" font-size="30" font-weight="800" fill="#eaeefc">They hear it once — then have to <tspan fill="#5ad1ff">clap it back.</tspan></text>
  <text x="72" y="470" font-size="25" font-weight="700" fill="#ff5db1" font-family="ui-monospace,Menlo,monospace">the whole beat lives in the URL · no backend</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
  <rect width="1200" height="630" fill="#0d0f14"/>
  <!-- target on the right -->
  <g transform="translate(890,315)">
    <circle r="230" fill="#171a22"/>
    <circle r="230" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="2"/>
    <circle r="153" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="2"/>
    <circle r="76" fill="none" stroke="rgba(255,255,255,.10)" stroke-width="2"/>
    <line x1="-230" y1="0" x2="230" y2="0" stroke="rgba(255,255,255,.12)" stroke-width="2"/>
    <line x1="0" y1="-230" x2="0" y2="230" stroke="rgba(255,255,255,.12)" stroke-width="2"/>
    <!-- scattered taps up-left -->
    <g fill="#5aa9ff">
      <circle cx="-70" cy="-52" r="11"/><circle cx="-92" cy="-38" r="11"/><circle cx="-58" cy="-70" r="11"/>
      <circle cx="-84" cy="-64" r="11"/><circle cx="-46" cy="-44" r="11"/><circle cx="-102" cy="-58" r="11"/>
      <circle cx="-66" cy="-30" r="11"/><circle cx="-78" cy="-80" r="11"/>
    </g>
    <!-- dead center X -->
    <g stroke="#ff5d8f" stroke-width="7"><line x1="-16" y1="-16" x2="16" y2="16"/><line x1="-16" y1="16" x2="16" y2="-16"/></g>
    <!-- mean arrow -->
    <line x1="0" y1="0" x2="-74" y2="-56" stroke="#ffca3a" stroke-width="7"/>
    <circle cx="-74" cy="-56" r="16" fill="#ffca3a"/>
  </g>
  <!-- title -->
  <text x="64" y="150" font-size="88" font-weight="800" fill="#eef1f7">Ask<tspan fill="#ffca3a">◎</tspan>ew</text>
  <text x="66" y="220" font-size="34" font-weight="600" fill="#949cad">Tap the exact center of 20 shapes.</text>
  <text x="66" y="272" font-size="34" font-weight="800" fill="#eef1f7">Which way does your brain <tspan fill="#ff5d8f">secretly lean?</tspan></text>
  <text x="66" y="470" font-size="26" font-weight="700" fill="#ffca3a" font-family="ui-monospace,Menlo,monospace">↖ Left-leaner · bias 3.2% · precision 88/100</text>
</svg>

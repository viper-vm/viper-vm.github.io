<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
  <defs>
    <radialGradient id="fl" cx="50%" cy="70%" r="60%">
      <stop offset="0" stop-color="#fff0b4"/><stop offset="40%" stop-color="#ff963c"/><stop offset="100%" stop-color="#ff3c1e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#120a08"/>
  <!-- flame on the right -->
  <g transform="translate(930,340)">
    <path d="M-70 200 Q-95 -30 10 -180 Q95 -30 70 200 Z" fill="url(#fl)"/>
    <ellipse cx="0" cy="60" rx="42" ry="110" fill="rgba(255,230,150,.6)"/>
    <g stroke="#5a3a28" stroke-width="20" stroke-linecap="round"><line x1="-90" y1="215" x2="90" y2="195"/><line x1="-90" y1="195" x2="90" y2="215"/></g>
    <g fill="#ffcf5a"><circle cx="60" cy="-40" r="6"/><circle cx="-40" cy="-90" r="5"/><circle cx="20" cy="-140" r="4"/></g>
  </g>
  <text x="70" y="160" font-size="72" font-weight="800" fill="#fbeee6">🔥 <tspan fill="#ff8a3d">LONGFIRE</tspan></text>
  <text x="72" y="220" font-size="32" font-weight="600" fill="#c19a86">Keep one flame alive — even while the tab is closed.</text>
  <text x="72" y="270" font-size="30" font-weight="800" fill="#fbeee6">Feed it, or pass it on like a <tspan fill="#ff8a3d">torch.</tspan></text>
  <text x="72" y="470" font-size="25" font-weight="700" fill="#ffcf5a" font-family="ui-monospace,Menlo,monospace">it can die while you sleep</text>
</svg>

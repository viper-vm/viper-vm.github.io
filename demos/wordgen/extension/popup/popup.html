<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordGen</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-logo">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="12" fill="url(#gradient)"/>
          <text x="24" y="32" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">W</text>
          <defs>
            <linearGradient id="gradient" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#3b82f6"/>
              <stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
        <div>
          <h1>WordGen</h1>
          <p>Smart Synonym Finder</p>
        </div>
      </div>
    </div>

    <!-- Quick Stats -->
    <div class="popup-stats">
      <div class="stat-item">
        <div class="stat-value" id="words-today">0</div>
        <div class="stat-label">Words Today</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="words-total">0</div>
        <div class="stat-label">Total Words</div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="popup-actions">
      <button class="action-btn primary" id="open-webapp">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Open WordGen App
      </button>

      <button class="action-btn" id="open-settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v6m0 6v6"/>
          <path d="m1 12 6 0m6 0h6"/>
          <path d="m4.93 4.93 4.24 4.24m5.66 5.66 4.24 4.24"/>
          <path d="m19.07 4.93-4.24 4.24m-5.66 5.66-4.24 4.24"/>
        </svg>
        Settings
      </button>
    </div>

    <!-- Current Site Status -->
    <div class="popup-site">
      <div class="site-info">
        <span class="site-label">Current Site:</span>
        <span class="site-name" id="current-site">Loading...</span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="site-enabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Quick Settings -->
    <div class="popup-quick-settings">
      <div class="setting-row">
        <label for="num-suggestions">Suggestions:</label>
        <select id="num-suggestions">
          <option value="3">3</option>
          <option value="5" selected>5</option>
          <option value="7">7</option>
          <option value="10">10</option>
        </select>
      </div>

      <div class="setting-row">
        <label for="trigger-method">Trigger:</label>
        <select id="trigger-method">
          <option value="dblclick" selected>Double-click</option>
          <option value="ctrl-click">Ctrl + Click</option>
          <option value="context-menu-only">Context Menu Only</option>
        </select>
      </div>
    </div>

    <!-- How to Use -->
    <div class="popup-help">
      <h3>How to Use:</h3>
      <ol>
        <li>Double-click any word on a webpage</li>
        <li>Browse synonym suggestions</li>
        <li>Click a suggestion to replace the word</li>
        <li>Or right-click → "Find Synonyms with WordGen"</li>
      </ol>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <a href="https://viper-vm.github.io/demos/wordgen/" target="_blank" class="footer-link">
        Documentation
      </a>
      <span class="footer-divider">•</span>
      <a href="https://github.com/viper-vm" target="_blank" class="footer-link">
        GitHub
      </a>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordGen</title>
<style>
  * { box-sizing: border-box; }
  button { font: inherit; color: inherit; }

  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font-ui);
    font-size: 13.5px;
    line-height: 1.45;
    color: var(--text);
    background: var(--note-bg);
    --font-ui: "Avenir Next", Avenir, Seravek, "Segoe UI", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
  }

  :root, :root[data-theme="paper"] {
    --font-display: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --note-bg: linear-gradient(178deg, #FFFAE6 0%, #FFF2C2 82%, #F8E7A6 100%);
    --text: #26221B; --muted: #7C7361;
    --accent: #C4593B; --accent-contrast: #FFFDF7; --accent-soft: rgba(196,89,59,.16);
    --card: #FFFDF7; --border: rgba(38,34,27,.18); --border-soft: rgba(38,34,27,.10);
    --chip-bg: rgba(255,253,247,.72);
    --tape: rgba(224,199,138,.6);
    --chip-tilt: rotate(-1.2deg);
  }
  :root[data-theme="ink"] {
    --font-display: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --note-bg: #14171C;
    --text: #ECEEF1; --muted: #8C949E;
    --accent: #4FD1A5; --accent-contrast: #0C1512; --accent-soft: rgba(79,209,165,.16);
    --card: #101216; --border: rgba(236,238,241,.2); --border-soft: rgba(236,238,241,.1);
    --chip-bg: rgba(236,238,241,.05);
    --tape: rgba(79,209,165,.22);
    --chip-tilt: none;
  }
  :root[data-theme="mist"] {
    --font-display: "Avenir Next", "Segoe UI", system-ui, sans-serif;
    --note-bg: #FBFCFE;
    --text: #2A3140; --muted: #7C8698;
    --accent: #4A5FC1; --accent-contrast: #FFFFFF; --accent-soft: rgba(74,95,193,.14);
    --card: #FFFFFF; --border: rgba(42,49,64,.15); --border-soft: rgba(42,49,64,.08);
    --chip-bg: #F2F5F9;
    --tape: rgba(74,95,193,.16);
    --chip-tilt: none;
  }

  .tape {
    position: fixed; top: -1px; left: 22px; width: 74px; height: 17px;
    transform: rotate(-2.5deg); transform-origin: left top;
    background: var(--tape);
    border-left: 1px dashed rgba(0,0,0,.10); border-right: 1px dashed rgba(0,0,0,.10);
    box-shadow: 0 1px 2px rgba(0,0,0,.10); pointer-events: none; z-index: 2;
  }

  header {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 12px 8px 16px; user-select: none;
    border-bottom: 1px solid var(--border-soft); flex: none;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); flex: none; }
  h1 { font-family: var(--font-display); font-weight: 700; font-size: 15px; letter-spacing: .2px; margin: 0 auto 0 0; }
  .ibtn {
    flex: none; width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: none; border-radius: 7px; cursor: pointer; padding: 0; font-size: 13px; color: var(--muted);
  }
  .ibtn:hover { background: var(--accent-soft); color: var(--text); }
  .ibtn[aria-pressed="true"] { background: var(--accent); color: var(--accent-contrast); }
  .ibtn svg { width: 15px; height: 15px; display: block; }

  main { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }
  .view { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }
  .view[hidden] { display: none; }

  textarea#input {
    margin: 10px 12px 0; padding: 8px 10px; min-height: 84px; max-height: 32vh; resize: none;
    background: var(--card); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    font: inherit; outline: none; overflow-y: auto;
  }
  textarea#input:focus-visible { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  textarea#input::placeholder { color: var(--muted); opacity: .9; }

  .chips {
    display: flex; align-items: center; gap: 6px; overflow-x: auto; overflow-y: hidden;
    padding: 9px 12px 7px; scrollbar-width: thin; flex: none;
  }
  .group {
    flex: none; font-size: 9.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); padding-right: 2px;
  }
  .sep { flex: none; width: 1px; height: 20px; background: var(--border); margin: 0 5px; }
  .chip {
    flex: none; display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 999px;
    background: var(--chip-bg); cursor: pointer; font-size: 12px; white-space: nowrap;
  }
  .chip:hover { border-color: var(--accent); }
  .chip[aria-pressed="true"] {
    background: var(--accent); border-color: var(--accent); color: var(--accent-contrast);
    transform: var(--chip-tilt);
  }

  .runrow { display: flex; gap: 8px; padding: 2px 12px 10px; flex: none; }
  #instruction {
    flex: 1 1 auto; min-width: 0; padding: 7px 10px;
    background: var(--card); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; font: inherit; font-size: 12.5px; outline: none;
  }
  #instruction:focus-visible { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  #instruction::placeholder { color: var(--muted); opacity: .9; }
  #run {
    flex: none; padding: 7px 14px; border: none; border-radius: 8px; cursor: pointer;
    background: var(--accent); color: var(--accent-contrast); font-weight: 700; font-size: 13px;
  }
  #run:hover:not(:disabled) { filter: brightness(1.08); }
  #run:disabled { opacity: .45; cursor: not-allowed; }

  #results { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 0 12px 10px; display: flex; flex-direction: column; gap: 8px; }
  .opt {
    background: var(--card); border: 1px solid var(--border-soft); border-radius: 10px;
    padding: 9px 10px; box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  .opt-text { white-space: pre-wrap; word-wrap: break-word; }
  .opt-note { margin-top: 4px; font-size: 11.5px; color: var(--muted); font-style: italic; }
  .opt-actions { display: flex; gap: 6px; margin-top: 7px; }
  .abtn {
    padding: 3px 10px; border: 1px solid var(--border); border-radius: 999px; background: transparent;
    cursor: pointer; font-size: 11.5px; color: var(--text);
  }
  .abtn:hover { border-color: var(--accent); color: var(--accent); }
  .error {
    margin: 0; padding: 8px 10px; border-radius: 8px; font-size: 12.5px;
    background: var(--accent-soft); border: 1px solid var(--accent); color: var(--text);
  }
  .banner {
    display: flex; align-items: center; gap: 8px; justify-content: space-between;
    padding: 8px 10px; border-radius: 8px; font-size: 12px;
    background: var(--accent-soft); border: 1px dashed var(--accent);
  }
  .skel { flex: none; height: 56px; border-radius: 10px;
    background: linear-gradient(90deg, var(--border-soft) 25%, var(--chip-bg) 50%, var(--border-soft) 75%);
    background-size: 200% 100%; animation: shimmer 1.1s linear infinite; }
  @keyframes shimmer { to { background-position: -200% 0; } }

  .syn-head { display: flex; align-items: center; gap: 8px; padding: 10px 12px 4px; flex: none; }
  .syn-title { font-family: var(--font-display); font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #synList { display: flex; flex-wrap: wrap; gap: 7px; padding: 8px 12px 12px; overflow-y: auto; align-content: flex-start; }
  .syn-word {
    display: inline-flex; align-items: baseline; gap: 6px; padding: 5px 11px;
    border: 1px solid var(--border); border-radius: 999px; background: var(--card);
    cursor: pointer; font-size: 13px;
  }
  .syn-word:hover { border-color: var(--accent); background: var(--accent-soft); }
  .syn-reg { font-size: 9.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }

  #histList { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 8px 10px 10px; display: flex; flex-direction: column; gap: 4px; }
  .hist-row {
    display: flex; align-items: baseline; gap: 8px; width: 100%; text-align: left;
    background: transparent; border: none; border-radius: 8px; padding: 7px 8px; cursor: pointer;
  }
  .hist-row:hover { background: var(--accent-soft); }
  .hist-snippet { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12.5px; }
  .hist-time { flex: none; font-size: 10.5px; color: var(--muted); }
  .empty { padding: 18px 12px; text-align: center; color: var(--muted); font-size: 12.5px; }

  footer {
    flex: none; display: flex; align-items: center; gap: 8px;
    padding: 6px 16px 8px; border-top: 1px solid var(--border-soft);
    font-size: 11px; color: var(--muted);
  }
  #engine { font-weight: 600; }
  #ms { margin-left: auto; font-variant-numeric: tabular-nums; }

  .toast {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
    background: var(--text); color: var(--card);
    padding: 7px 14px; border-radius: 999px; font-size: 12.5px;
    box-shadow: 0 4px 14px rgba(0,0,0,.25); pointer-events: none;
    opacity: 0; transition: opacity .15s ease-out; z-index: 3;
  }
  .toast.show { opacity: 1; }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

  @media (prefers-reduced-motion: reduce) {
    .skel { animation: none; }
    .toast { transition: none; }
  }
</style>
</head>
<body>
  <div class="tape" aria-hidden="true"></div>

  <header>
    <span class="dot" aria-hidden="true"></span>
    <h1>WordGen</h1>
    <button class="ibtn" id="historyBtn" title="History">&#128220;</button>
    <button class="ibtn" id="optionsBtn" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.01a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.01a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
    </button>
  </header>

  <main>
    <div class="view" id="viewMain">
      <textarea id="input" rows="4" placeholder="Paste or type anything &#8212; a sentence, an email draft, a prompt idea&#8230;"></textarea>
      <div class="chips" id="chips" role="listbox" aria-label="Modes"></div>
      <div class="runrow">
        <input id="instruction" type="text" placeholder="Optional instruction&#8230;">
        <button id="run" disabled>Transform &#10022;</button>
      </div>
      <div id="results"></div>
    </div>

    <div class="view" id="viewSyn" hidden>
      <div class="syn-head">
        <button class="abtn" id="synBack">&#8592; Back</button>
        <span class="syn-title" id="synTitle"></span>
      </div>
      <div id="synList"></div>
    </div>

    <div class="view" id="viewHist" hidden>
      <div id="histList"></div>
    </div>
  </main>

  <footer>
    <span id="engine"></span>
    <span id="ms"></span>
  </footer>

  <div class="toast" id="toast" role="status"></div>

  <script type="module" src="note.js"></script>
</body>
</html>

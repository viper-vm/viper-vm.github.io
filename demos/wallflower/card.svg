  <text x="70" y="150" font-size="66" font-weight="800" fill="#e9f3ea">🌱 <tspan fill="#7ed957">WALLFLOWER</tspan></text>
  <text x="72" y="212" font-size="32" font-weight="600" fill="#8ba394">A plant that only grows while you look away.</text>
  <text x="72" y="262" font-size="30" font-weight="800" fill="#e9f3ea">Stare at it, and it <tspan fill="#ffb04d">wilts.</tspan></text>
  <text x="72" y="470" font-size="25" font-weight="700" fill="#7ed957" font-family="ui-monospace,Menlo,monospace">an idle game that punishes you for playing it</text>

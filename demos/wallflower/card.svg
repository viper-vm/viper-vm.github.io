    <path d="M0 490 Q10 350 0 200" fill="none" stroke="#7ed957" stroke-width="12" stroke-linecap="round"/>
    <ellipse cx="-30" cy="410" rx="34" ry="16" fill="#6fce4a" transform="rotate(-20 -30 410)"/>
